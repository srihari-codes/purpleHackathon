version: "3.9"

services:
  api:
    build: .
    container_name: store_intelligence_api
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite DB between restarts
      - db_data:/app/db
      # Mount data directory for store_layout.json and pos_transactions.csv
      - ./data:/app/data:ro
    environment:
      - DATABASE_URL=sqlite:////app/db/store_intelligence.db
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  db_data:
