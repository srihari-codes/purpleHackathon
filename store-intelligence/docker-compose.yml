# ─────────────────────────────────────────────────────────────────────────────
# Store Intelligence — Detection Layer
#
# Usage:
#   GPU (default):
#     docker compose up pipeline
#
#   CPU-only (no NVIDIA driver / CI):
#     docker compose --profile cpu up pipeline-cpu
#
# Point at real footage:
#   CLIPS_DIR=/path/to/CCTV docker compose up pipeline
#
# Build args (passed at docker compose build time):
#   USE_CUDA=1   force CUDA torch (default when using nvidia base image)
#   USE_CUDA=0   force CPU torch (for cpu profile)
#
# Runtime environment overrides:
#   STORE_ID, CLIPS_DIR, OUTPUT, GUI_PORT, SPEED, LOG_LEVEL, CAM3_START_ISO,
#   POS_ABANDON_WINDOW_SEC (45 for short clips, 300 for 20-min production)
# ─────────────────────────────────────────────────────────────────────────────

# ── Shared base config ────────────────────────────────────────────────────────
x-pipeline-env: &pipeline-env
  STORE_ID: ${STORE_ID:-}
  CLIPS_DIR: ${CLIPS_DIR:-/data/clips}
  OUTPUT: ${OUTPUT:-/data/events.jsonl}
  CAMERA_MAP: ${CAMERA_MAP:-{}}
  CAMERA_ROLES: ${CAMERA_ROLES:-{}}
  CAMERA_ADJACENCY: ${CAMERA_ADJACENCY:-{}}
  GUI_PORT: ${GUI_PORT:-8080}
  SPEED: ${SPEED:-0} # 0 = max speed; 1.0 = real-time
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  PYTHONUNBUFFERED: "1"
  # Billing queue abandon window (seconds).
  # 45s for 2-min test clips; set to 300 for 20-min production clips.
  POS_ABANDON_WINDOW_SEC: ${POS_ABANDON_WINDOW_SEC:-45}

x-pipeline-volumes: &pipeline-volumes
  - ${CLIPS_DIR:-./data/clips}:/data/clips:ro
  - ${DATA_DIR:-./data}:/data
  # Hot-reload pipeline source during development
  - ./pipeline:/app/pipeline:ro
  # Calibration JSON — shared between calibrate tool and pipeline containers
  - ./data/calibration:/data/calibration

services:
  # ── GPU pipeline (default) ────────────────────────────────────────────────
  pipeline:
    build:
      context: .
      dockerfile: pipeline/Dockerfile
      args:
        # USE_CUDA=auto → installs CUDA torch when BASE_IMAGE contains "cuda"
        USE_CUDA: ${USE_CUDA:-auto}
    container_name: store_detection_pipeline
    volumes: *pipeline-volumes
    environment:
      <<: *pipeline-env
      # Tell NVIDIA container runtime to expose GPU
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,video,utility
    ports:
      - "${GUI_PORT:-8080}:8080"
    restart: "no"
    # Request GPU access via the Docker GPU reservation API (compose v2+)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

  # ── CPU-only pipeline (no NVIDIA driver required) ─────────────────────────
  # Run with:  docker compose --profile cpu up pipeline-cpu
  pipeline-cpu:
    profiles: [ cpu ]
    build:
      context: .
      dockerfile: pipeline/Dockerfile
      args:
        BASE_IMAGE: ubuntu:22.04
        USE_CUDA: "0"
    container_name: store_detection_pipeline_cpu
    volumes: *pipeline-volumes
    environment:
      <<: *pipeline-env
      # Explicitly hide all GPUs so torch falls back to CPU cleanly
      NVIDIA_VISIBLE_DEVICES: "void"
    ports:
      - "${GUI_PORT:-8080}:8080"
    restart: "no"

  # ── Zone calibration tool (run once to draw zone polygons) ───────────────
  calibrate:
    build:
      context: .
      dockerfile: pipeline/Dockerfile
      args:
        USE_CUDA: ${USE_CUDA:-auto}
    container_name: store_zone_calibrator
    volumes: *pipeline-volumes
    environment: *pipeline-env
    ports:
      - "8081:8081"
    restart: "no"
    entrypoint: [ "python3", "/app/pipeline/calibrate_zones.py", "--clips_dir", "/data/clips", "--port", "8081" ]

  # ── Store Intelligence API ────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: store_intelligence_api
    volumes:
      - ${DATA_DIR:-./data}:/data
      - ./app:/api/app:ro
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      POS_CSV: /data/pos_transactions.csv
      PYTHONUNBUFFERED: "1"
    ports:
      - "${API_PORT:-8000}:8000"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
