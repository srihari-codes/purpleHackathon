<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zone Calibration Studio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e1a;color:#c9d1d9;font-family:'Inter',system-ui,sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
#topbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:#0d1117;border-bottom:1px solid #21262d;flex-shrink:0}
#topbar h1{font-size:.85rem;font-weight:600;color:#58a6ff;margin-right:8px}
.tbtn{background:#161b22;border:1px solid #30363d;color:#c9d1d9;padding:5px 11px;border-radius:6px;cursor:pointer;font-size:.75rem;font-family:inherit;transition:all .15s}
.tbtn:hover{background:#21262d;border-color:#58a6ff;color:#58a6ff}
.tbtn.active{background:#1f3a5f;border-color:#58a6ff;color:#58a6ff}
.tbtn.danger{border-color:#f85149;color:#f85149}
.tbtn.danger:hover{background:#3d1414}
.tbtn.success{border-color:#3fb950;color:#3fb950}
.tbtn.success:hover{background:#14301f}
#sep{flex:1}
#status-bar{font-size:.7rem;color:#8b949e;padding:0 8px;max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#main{display:flex;flex:1;overflow:hidden}
#cambar{width:155px;background:#0d1117;border-right:1px solid #21262d;display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
#cambar h2{font-size:.65rem;color:#8b949e;padding:10px 12px 4px;text-transform:uppercase;letter-spacing:.08em}
.cam-btn{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;border:none;background:none;color:#8b949e;font-size:.75rem;font-family:inherit;width:100%;text-align:left;border-left:3px solid transparent;transition:all .15s}
.cam-btn:hover{background:#161b22;color:#c9d1d9}
.cam-btn.active{background:#161b22;color:#58a6ff;border-left-color:#58a6ff}
.cam-dot{width:8px;height:8px;border-radius:50%;background:#30363d;flex-shrink:0}
.cam-btn.active .cam-dot{background:#58a6ff}
#canvas-wrap{flex:1;position:relative;overflow:hidden;background:#050810;cursor:crosshair}
#cv{display:block;position:absolute;top:0;left:0;transform-origin:0 0}
#zoom-hint{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,.7);color:#8b949e;font-size:.65rem;padding:4px 8px;border-radius:4px;pointer-events:none}
#sidebar{width:260px;background:#0d1117;border-left:1px solid #21262d;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
#sidebar-tabs{display:flex;border-bottom:1px solid #21262d;flex-shrink:0}
.stab{flex:1;padding:8px;font-size:.72rem;text-align:center;cursor:pointer;color:#8b949e;border:none;background:none;font-family:inherit;border-bottom:2px solid transparent;transition:all .15s}
.stab.active{color:#58a6ff;border-bottom-color:#58a6ff}
#tab-zones{display:flex;flex-direction:column;flex:1;overflow:hidden}
#tab-props{display:none;flex-direction:column;flex:1;overflow:hidden;padding:12px;gap:10px}
#zone-list-wrap{flex:1;overflow-y:auto;padding:8px}
.zone-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:8px 10px;margin-bottom:6px;cursor:pointer;transition:all .15s;border-left:3px solid #30363d}
.zone-card:hover{border-color:#58a6ff30;background:#1a2030}
.zone-card.selected{border-color:#58a6ff;background:#1f2d42}
.zone-card-top{display:flex;align-items:center;gap:6px}
.zone-swatch{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.zone-name{flex:1;font-size:.75rem;font-weight:500;color:#c9d1d9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.zone-role-badge{font-size:.6rem;color:#8b949e;background:#21262d;padding:1px 5px;border-radius:3px;flex-shrink:0}
.zone-del{background:none;border:none;color:#f85149;cursor:pointer;font-size:.85rem;padding:0 2px;opacity:.5;transition:opacity .15s;flex-shrink:0}
.zone-del:hover{opacity:1}
.zone-pts{font-size:.62rem;color:#8b949e;margin-top:3px;padding-left:18px}
#add-zone-btn{margin:8px;padding:9px;background:#1f3a5f;border:1px dashed #58a6ff;color:#58a6ff;border-radius:8px;cursor:pointer;font-size:.8rem;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;flex-shrink:0}
#add-zone-btn:hover{background:#1a4070;border-style:solid}
.prop-label{font-size:.68rem;color:#8b949e;margin-bottom:3px;display:block}
.prop-input{width:100%;background:#161b22;border:1px solid #30363d;color:#c9d1d9;padding:6px 8px;border-radius:6px;font-size:.78rem;font-family:inherit;transition:border-color .15s}
.prop-input:focus{outline:none;border-color:#58a6ff}
.prop-select{width:100%;background:#161b22;border:1px solid #30363d;color:#c9d1d9;padding:6px 8px;border-radius:6px;font-size:.78rem;font-family:inherit}
.prop-row{display:flex;gap:8px;align-items:center}
.prop-color{width:36px;height:30px;border:1px solid #30363d;border-radius:6px;cursor:pointer;background:none;padding:2px}
#val-panel{background:#0d1117;border-top:1px solid #21262d;padding:8px;max-height:150px;overflow-y:auto;flex-shrink:0}
#val-panel h3{font-size:.65rem;color:#8b949e;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.val-item{font-size:.67rem;padding:3px 6px;border-radius:4px;margin-bottom:2px;display:flex;gap:6px;align-items:flex-start}
.val-item.ERROR{background:#3d141420;color:#f85149;border-left:2px solid #f85149}
.val-item.WARNING{background:#3d2a0020;color:#e3b341;border-left:2px solid #e3b341}
.val-item.INFO{background:#1f3a5f20;color:#58a6ff;border-left:2px solid #58a6ff}
.val-badge{font-size:.58rem;font-weight:700;flex-shrink:0;margin-top:1px}
#drawing-mode-hint{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(88,166,255,.15);border:1px solid #58a6ff;color:#58a6ff;padding:6px 14px;border-radius:20px;font-size:.75rem;pointer-events:none;display:none;backdrop-filter:blur(4px)}
</style>
</head>
<body>
<div id="topbar">
  <h1>⬡ Zone Calibration Studio</h1>
  <button class="tbtn active" id="btn-mode-select" onclick="setMode('select')">↖ Select</button>
  <button class="tbtn" id="btn-mode-draw" onclick="setMode('draw')">✏ Draw</button>
  <button class="tbtn" id="btn-mode-line" onclick="setMode('line')">╱ Entry Line</button>
  <span style="width:1px;height:18px;background:#30363d"></span>
  <button class="tbtn" onclick="undo()" title="Ctrl+Z">↩ Undo</button>
  <button class="tbtn" onclick="redo()" title="Ctrl+Y">↪ Redo</button>
  <button class="tbtn danger" id="btn-delete-sel" onclick="deleteSelected()" style="display:none">🗑 Delete</button>
  <button class="tbtn" onclick="fitView()">⤢ Fit</button>
  <span id="sep"></span>
  <span id="status-bar">Select a camera to begin</span>
  <button class="tbtn success" onclick="saveCalib()">💾 Save</button>
</div>
<div id="main">
  <div id="cambar">
    <h2>Cameras</h2>
    <div id="cam-list"></div>
  </div>
  <div id="canvas-wrap">
    <canvas id="cv"></canvas>
    <div id="drawing-mode-hint"></div>
    <div id="zoom-hint">Scroll: zoom &nbsp;|&nbsp; Space+drag: pan</div>
  </div>
  <div id="sidebar">
    <div id="sidebar-tabs">
      <button class="stab active" onclick="showTab('zones')">Zones</button>
      <button class="stab" onclick="showTab('props')" id="props-tab-btn">Properties</button>
    </div>
    <div id="tab-zones">
      <button id="add-zone-btn" onclick="addNewZone()">＋ Add Zone</button>
      <div id="zone-list-wrap"></div>
    </div>
    <div id="tab-props">
      <div>
        <span class="prop-label">Shape ID</span>
        <input class="prop-input" id="prop-id" placeholder="ZONE_ID" onchange="updateProp('shape_id',this.value)">
      </div>
      <div>
        <span class="prop-label">Label</span>
        <input class="prop-input" id="prop-label" placeholder="Label" onchange="updateProp('label',this.value)">
      </div>
      <div>
        <span class="prop-label">Role</span>
        <select class="prop-select" id="prop-role" onchange="updateProp('role',this.value)">
          <option value="zone">zone</option>
          <option value="entry_line">entry_line (CAM3)</option>
          <option value="inside_region">inside_region (CAM3)</option>
          <option value="outside_region">outside_region (CAM3)</option>
          <option value="billing_counter">billing_counter (CAM5)</option>
          <option value="queue_area">queue_area (CAM5)</option>
          <option value="staff_area">staff_area (CAM4)</option>
        </select>
      </div>
      <div class="prop-row">
        <div style="flex:1">
          <span class="prop-label">Color</span>
          <input type="color" class="prop-color" id="prop-color" onchange="updateProp('color',this.value)">
        </div>
        <div style="flex:1">
          <span class="prop-label">Enabled</span>
          <input type="checkbox" id="prop-enabled" style="width:18px;height:18px;margin-top:6px" onchange="updateProp('enabled',this.checked)">
        </div>
      </div>
      <div id="cam3-panel" style="display:none;background:#1a1f2e;border:1px solid #30363d;border-radius:8px;padding:10px">
        <div style="font-size:.7rem;color:#e3b341;margin-bottom:6px;font-weight:600">⚡ CAM3 Entry Line Config</div>
        <span class="prop-label">Inside direction</span>
        <select class="prop-select" id="prop-inside-is" onchange="updateEntryMeta('inside_is',this.value)">
          <option value="below">below (higher y = inside)</option>
          <option value="above">above (lower y = inside)</option>
        </select>
      </div>
    </div>
    <div id="val-panel">
      <h3>Validation</h3>
      <div id="val-list"><div class="val-item INFO"><span class="val-badge">INFO</span>No issues detected</div></div>
    </div>
  </div>
</div>
<script>
// ── State ─────────────────────────────────────────────────────────────────
const CAMERAS = __CAMERAS__;
let calib     = __CALIB__;
let currentCam = null;
let selectedIdx = -1;
let mode = 'select';      // 'select' | 'draw' | 'line'
let drawPts = [];          // in-progress polygon points (normalized)
let frames  = {};          // camera_id → base64

// Canvas transform
let scale = 1, offX = 0, offY = 0;
let panning = false, panStart = {x:0,y:0}, panOff = {x:0,y:0};
let spaceDown = false;

// Drag state
let dragging = false, dragShapeIdx = -1, dragStart = {x:0,y:0};
let dragOrigPts = [];

// Vertex drag
let dragVertIdx = -1, dragVertShapeIdx = -1;

// History
let history = [], histIdx = -1;
const MAX_HIST = 50;

// Colors palette
const PALETTE = [
  '#00AAFF','#FF6B35','#A855F7','#22D3EE','#F59E0B','#10B981',
  '#EF4444','#EC4899','#84CC16','#F97316','#06B6D4','#8B5CF6',
  '#D946EF','#14B8A6','#F43F5E','#FBBF24','#34D399','#60A5FA',
  '#C084FC','#FB923C'
];

const cv   = document.getElementById('cv');
const ctx  = cv.getContext('2d');
const wrap = document.getElementById('canvas-wrap');

// ── Camera sidebar ─────────────────────────────────────────────────────────
(()=>{
  const list = document.getElementById('cam-list');
  CAMERAS.forEach(cid => {
    const b = document.createElement('button');
    b.className = 'cam-btn'; b.id = 'cbtn-'+cid;
    const roles = (calib.cameras?.[cid]?.shapes||[]).map(s=>s.role).join(',');
    b.innerHTML = `<span class="cam-dot"></span><span>${cid.replace('CAM_','CAM ')}</span>`;
    b.onclick = ()=>selectCam(cid);
    list.appendChild(b);
  });
})();

function selectCam(cid){
  pushHistory();
  currentCam = cid; selectedIdx = -1; drawPts = [];
  document.querySelectorAll('.cam-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('cbtn-'+cid)?.classList.add('active');
  if(!calib.cameras) calib.cameras = {};
  if(!calib.cameras[cid]) calib.cameras[cid] = {shapes:[]};
  setStatus(`Camera: ${cid}`);
  if(frames[cid]){ fitView(); renderZoneList(); render(); }
  else{
    setStatus('Loading frame…');
    fetch('/frame/'+encodeURIComponent(cid)).then(r=>r.json()).then(d=>{
      frames[cid]=d.frame; fitView(); renderZoneList(); render();
    });
  }
}

// ── Mode ──────────────────────────────────────────────────────────────────
function setMode(m){
  mode = m; drawPts = [];
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-mode-'+m)?.classList.add('active');
  const hint = document.getElementById('drawing-mode-hint');
  if(m==='draw'){
    hint.style.display='block'; hint.textContent='Click to add points — Double-click or Enter to close';
    wrap.style.cursor='crosshair';
  } else if(m==='line'){
    hint.style.display='block'; hint.textContent='Click 2 points to set entry line';
    wrap.style.cursor='crosshair';
  } else {
    hint.style.display='none'; wrap.style.cursor='default';
  }
  render();
}

// ── Zone list UI ──────────────────────────────────────────────────────────
function renderZoneList(){
  const wrap2 = document.getElementById('zone-list-wrap');
  const shapes = currentShapes();
  wrap2.innerHTML = '';
  shapes.forEach((s,i)=>{
    const d = document.createElement('div');
    d.className = 'zone-card' + (i===selectedIdx?' selected':'');
    d.style.borderLeftColor = s.color||'#444';
    d.innerHTML = `
      <div class="zone-card-top">
        <span class="zone-swatch" style="background:${s.color||'#888'}"></span>
        <span class="zone-name" title="${s.shape_id}">${s.label||s.shape_id}</span>
        <span class="zone-role-badge">${s.role||'zone'}</span>
        <button class="zone-del" onclick="deleteZone(${i},event)" title="Remove">✕</button>
      </div>
      <div class="zone-pts">${s.shape_type==='line'?'Line':'Polygon'} · ${(s.points||[]).length} pts${s.enabled===false?' · hidden':''}</div>`;
    d.onclick = (e)=>{ if(e.target.classList.contains('zone-del')) return; selectShape(i); };
    wrap2.appendChild(d);
  });
}

function currentShapes(){
  if(!currentCam || !calib.cameras?.[currentCam]) return [];
  return calib.cameras[currentCam].shapes || [];
}

function selectShape(i){
  selectedIdx = i; renderZoneList(); fillProps(); showTab('props'); render(); updateToolbar();
}

function addNewZone(){
  if(!currentCam){ setStatus('Select a camera first'); return; }
  const shapes = currentShapes();
  const color  = PALETTE[shapes.length % PALETTE.length];
  const idx    = shapes.length + 1;
  const newShape = {
    shape_id:`ZONE_${currentCam.split('_').pop()}_${idx}`,
    shape_type:'polygon', role:'zone',
    label:`Zone ${idx}`, points:[], color, enabled:true
  };
  pushHistory();
  shapes.push(newShape);
  selectedIdx = shapes.length-1;
  setMode('draw');
  renderZoneList(); fillProps(); showTab('props');
  setStatus('Drawing — click to add points, double-click to close');
}

function deleteZone(i, e){
  if(e){e.stopPropagation();}
  pushHistory();
  currentShapes().splice(i,1);
  if(selectedIdx===i) selectedIdx=-1;
  else if(selectedIdx>i) selectedIdx--;
  renderZoneList(); render(); validate(); updateToolbar();
}

// ── Properties panel ──────────────────────────────────────────────────────
function fillProps(){
  const s = currentShapes()[selectedIdx];
  if(!s) return;
  document.getElementById('prop-id').value    = s.shape_id||'';
  document.getElementById('prop-label').value = s.label||'';
  document.getElementById('prop-role').value  = s.role||'zone';
  document.getElementById('prop-color').value = s.color||'#00aaff';
  document.getElementById('prop-enabled').checked = s.enabled!==false;
  const cam3 = document.getElementById('cam3-panel');
  cam3.style.display = (s.role==='entry_line')?'block':'none';
  if(s.role==='entry_line')
    document.getElementById('prop-inside-is').value = s.meta?.inside_is||'below';
}

function updateProp(key,val){
  const s = currentShapes()[selectedIdx];
  if(!s) return;
  pushHistory();
  s[key]=val;
  renderZoneList(); render(); validate();
}

function updateEntryMeta(key,val){
  const s = currentShapes()[selectedIdx];
  if(!s) return;
  if(!s.meta) s.meta={};
  s.meta[key]=val;
}

// ── Tabs ──────────────────────────────────────────────────────────────────
function showTab(t){
  document.getElementById('tab-zones').style.display = t==='zones'?'flex':'none';
  document.getElementById('tab-props').style.display = t==='props'?'flex':'none';
  document.querySelectorAll('.stab').forEach((b,i)=>b.classList.toggle('active', (i===0&&t==='zones')||(i===1&&t==='props')));
}

// ── Canvas helpers ─────────────────────────────────────────────────────────
function toCanvas(nx,ny){ return {x:nx*cv.width*scale+offX, y:ny*cv.height*scale+offY}; }
function toNorm(cx,cy){ return {x:(cx-offX)/(cv.width*scale), y:(cy-offY)/(cv.height*scale)}; }
function wrapXY(e){
  const r=wrap.getBoundingClientRect();
  return {x:e.clientX-r.left, y:e.clientY-r.top};
}

function fitView(){
  if(!currentCam||!frames[currentCam]) return;
  const img=new Image(); img.onload=()=>{
    cv.width=img.naturalWidth; cv.height=img.naturalHeight;
    const ws=wrap.clientWidth/cv.width, hs=wrap.clientHeight/cv.height;
    scale=Math.min(ws,hs)*.97;
    offX=(wrap.clientWidth-cv.width*scale)/2;
    offY=(wrap.clientHeight-cv.height*scale)/2;
    render();
  }; img.src='data:image/jpeg;base64,'+frames[currentCam];
}

// ── Render ────────────────────────────────────────────────────────────────
function render(){
  if(!currentCam||!frames[currentCam]){ ctx.clearRect(0,0,cv.width,cv.height); return; }
  const img=new Image(); img.onload=()=>{
    ctx.clearRect(0,0,cv.width,cv.height);
    ctx.save(); ctx.setTransform(scale,0,0,scale,offX,offY);
    ctx.drawImage(img,0,0,cv.width,cv.height);
    // draw committed shapes
    currentShapes().forEach((s,i)=>{
      if(!s.points||s.points.length<2) return;
      const pts=s.points.map(p=>({x:p[0]*cv.width,y:p[1]*cv.height}));
      const col=s.color||'#888';
      const sel=i===selectedIdx;
      ctx.save();
      if(s.shape_type==='line'){
        ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y); ctx.lineTo(pts[1].x,pts[1].y);
        ctx.strokeStyle=col; ctx.lineWidth=sel?4:3;
        if(sel){ctx.shadowColor=col;ctx.shadowBlur=8;}
        ctx.stroke();
        // Direction arrow
        const mx=(pts[0].x+pts[1].x)/2, my=(pts[0].y+pts[1].y)/2;
        const ang=Math.atan2(pts[1].y-pts[0].y,pts[1].x-pts[0].x);
        ctx.save(); ctx.translate(mx,my); ctx.rotate(ang);
        ctx.fillStyle=col; ctx.beginPath(); ctx.moveTo(0,-8); ctx.lineTo(15,0); ctx.lineTo(0,8); ctx.closePath(); ctx.fill();
        ctx.restore();
        // endpoints
        [pts[0],pts[1]].forEach(p=>{
          ctx.beginPath(); ctx.arc(p.x,p.y,5,0,Math.PI*2);
          ctx.fillStyle=col; ctx.fill();
        });
      } else {
        ctx.beginPath(); pts.forEach((p,j)=>j?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
        ctx.closePath();
        ctx.fillStyle=col+'28'; ctx.fill();
        ctx.strokeStyle=col; ctx.lineWidth=sel?3:2;
        if(sel){ctx.shadowColor=col;ctx.shadowBlur=10;}
        ctx.stroke();
        // vertices
        pts.forEach((p,vi)=>{
          ctx.beginPath(); ctx.arc(p.x,p.y,sel?6:4,0,Math.PI*2);
          ctx.fillStyle=vi===0?'#fff':col; ctx.fill();
          ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.stroke();
        });
        // label
        const cx=pts.reduce((s,p)=>s+p.x,0)/pts.length;
        const cy=pts.reduce((s,p)=>s+p.y,0)/pts.length;
        ctx.fillStyle=col; ctx.font=`bold ${sel?14:12}px Inter,system-ui`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.shadowColor='#000'; ctx.shadowBlur=4;
        ctx.fillText(s.label||s.shape_id,cx,cy);
      }
      ctx.restore();
    });
    // in-progress draw
    if(drawPts.length>0){
      const pts=drawPts.map(p=>({x:p[0]*cv.width,y:p[1]*cv.height}));
      ctx.save();
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.setLineDash([5,4]);
      ctx.beginPath(); pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
      ctx.stroke(); ctx.setLineDash([]);
      pts.forEach((p,i)=>{
        ctx.beginPath(); ctx.arc(p.x,p.y,i===0?7:5,0,Math.PI*2);
        ctx.fillStyle=i===0?'#ffffff':'#58a6ff'; ctx.fill();
      });
      ctx.restore();
    }
    ctx.restore();
  };
  img.src='data:image/jpeg;base64,'+frames[currentCam];
}

// ── Mouse events ──────────────────────────────────────────────────────────
wrap.addEventListener('mousedown',e=>{
  const {x,y}=wrapXY(e);
  if(e.button===1||(e.button===0&&spaceDown)){panning=true;panStart={x,y};panOff={x:offX,y:offY};e.preventDefault();return;}
  if(e.button!==0) return;
  if(mode==='select'){
    // Check vertex drag first
    const n=toNorm(x,y);
    let found=-1,foundV=-1;
    currentShapes().forEach((s,si)=>{
      (s.points||[]).forEach((p,vi)=>{
        const c=toCanvas(p[0],p[1]);
        if(Math.hypot(x-c.x,y-c.y)<8){found=si;foundV=vi;}
      });
    });
    if(found>=0){dragVertShapeIdx=found;dragVertIdx=foundV;return;}
    // Check polygon drag
    const shapes=currentShapes();
    for(let i=shapes.length-1;i>=0;i--){
      const s=shapes[i];
      if(!s.points||s.points.length<2) continue;
      if(pointInPoly(n.x,n.y,s.points)){
        pushHistory(); dragShapeIdx=i; dragging=true;
        dragStart={x,y}; dragOrigPts=s.points.map(p=>[...p]);
        selectShape(i); break;
      }
    }
  }
});

wrap.addEventListener('mousemove',e=>{
  const {x,y}=wrapXY(e);
  if(panning){ offX=panOff.x+(x-panStart.x); offY=panOff.y+(y-panStart.y); render(); return; }
  if(dragVertShapeIdx>=0&&dragVertIdx>=0){
    const n=toNorm(x,y);
    const pts=currentShapes()[dragVertShapeIdx]?.points;
    if(pts){ pts[dragVertIdx]=[clamp01(n.x),clamp01(n.y)]; render(); }
    return;
  }
  if(!dragging && !panning && mode==='select' && !spaceDown && dragVertShapeIdx<0){
    // Will be handled in click for deselect
  }
  if(dragging&&dragShapeIdx>=0){
    const dx=(x-dragStart.x)/(cv.width*scale);
    const dy=(y-dragStart.y)/(cv.height*scale);
    const s=currentShapes()[dragShapeIdx];
    if(s){ s.points=dragOrigPts.map(p=>[clamp01(p[0]+dx),clamp01(p[1]+dy)]); render(); }
  }
});

wrap.addEventListener('mouseup',()=>{
  panning=false;
  if(dragging||dragVertShapeIdx>=0){ validate(); renderZoneList(); }
  dragging=false; dragShapeIdx=-1; dragVertShapeIdx=-1; dragVertIdx=-1;
});

wrap.addEventListener('click',e=>{
  if(panning||dragging||dragVertShapeIdx>=0) return;
  if(e.button!==0) return;
  if(mode==='select'){
    // If click but no drag started (mousedown didn't find a poly), deselect
    if(dragShapeIdx<0 && dragVertShapeIdx<0 && !dragging){
      selectedIdx=-1; renderZoneList(); updateToolbar(); render();
    }
    return;
  }
  if(mode==='draw'||mode==='line'){
    const {x,y}=wrapXY(e);
    const n=toNorm(x,y);
    drawPts.push([clamp01(n.x),clamp01(n.y)]);
    if(mode==='line'&&drawPts.length===2){
      commitLine(); return;
    }
    render();
  }
});

wrap.addEventListener('dblclick',e=>{
  if(mode==='draw') closePoly();
});

wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const {x,y}=wrapXY(e);
  const delta=e.deltaY>0?.9:1.1;
  offX=x-(x-offX)*delta; offY=y-(y-offY)*delta;
  scale*=delta; render();
},{passive:false});

document.addEventListener('keydown',e=>{
  if(e.key===' '){spaceDown=true;wrap.style.cursor='grab';e.preventDefault();}
  if(e.key==='Enter'&&mode==='draw') closePoly();
  if(e.key==='Escape'){drawPts=[];setMode('select');}
  if(e.key==='Delete'&&selectedIdx>=0) deleteZone(selectedIdx,null);
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){undo();e.preventDefault();}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||e.key==='Z')){redo();e.preventDefault();}
});
document.addEventListener('keyup',e=>{
  if(e.key===' '){spaceDown=false;wrap.style.cursor=mode==='select'?'default':'crosshair';}
});

// ── Draw helpers ──────────────────────────────────────────────────────────
function closePoly(){
  if(drawPts.length<3){setStatus('Need at least 3 points');return;}
  if(selectedIdx>=0){
    pushHistory();
    currentShapes()[selectedIdx].points=drawPts.map(p=>[...p]);
    drawPts=[];
  } else {
    addNewZone();
    currentShapes()[selectedIdx].points=drawPts.map(p=>[...p]);
    drawPts=[];
  }
  setMode('select'); renderZoneList(); render(); validate();
}

function commitLine(){
  if(selectedIdx>=0){
    pushHistory();
    const s=currentShapes()[selectedIdx];
    s.points=drawPts.map(p=>[...p]); s.shape_type='line';
    if(s.role==='zone') s.role='entry_line';
    if(!s.meta) s.meta={inside_is:'below'};
    drawPts=[];
  } else {
    // Create new line shape
    const shapes=currentShapes();
    const color=PALETTE[shapes.length%PALETTE.length];
    shapes.push({shape_id:'ENTRY_LINE',shape_type:'line',role:'entry_line',
      label:'ENTRY_DOOR',points:drawPts.map(p=>[...p]),color,enabled:true,meta:{inside_is:'below'}});
    selectedIdx=shapes.length-1; drawPts=[];
  }
  setMode('select'); renderZoneList(); fillProps(); showTab('props'); render(); validate();
}

// ── History ───────────────────────────────────────────────────────────────
function pushHistory(){
  const snap=JSON.parse(JSON.stringify(calib));
  history=history.slice(0,histIdx+1);
  history.push(snap);
  if(history.length>MAX_HIST) history.shift();
  histIdx=history.length-1;
}
function undo(){
  if(histIdx<=0){setStatus('Nothing to undo');return;}
  histIdx--; calib=JSON.parse(JSON.stringify(history[histIdx]));
  renderZoneList(); render(); validate();
}
function redo(){
  if(histIdx>=history.length-1){setStatus('Nothing to redo');return;}
  histIdx++; calib=JSON.parse(JSON.stringify(history[histIdx]));
  renderZoneList(); render(); validate();
}

// ── Geometry helpers ──────────────────────────────────────────────────────
function clamp01(v){return Math.max(0,Math.min(1,v));}
function pointInPoly(nx,ny,pts){
  let inside=false,n=pts.length;
  for(let i=0,j=n-1;i<n;j=i++){
    const xi=pts[i][0],yi=pts[i][1],xj=pts[j][0],yj=pts[j][1];
    if(((yi>ny)!==(yj>ny))&&(nx<(xj-xi)*(ny-yi)/(yj-yi)+xi)) inside=!inside;
  } return inside;
}

// ── Validation ────────────────────────────────────────────────────────────
let validateTimeout=null;
function validate(){
  clearTimeout(validateTimeout);
  validateTimeout=setTimeout(()=>{
    fetch('/validate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(calib)})
      .then(r=>r.json()).then(d=>renderValidation(d.issues||[])).catch(()=>{});
  },600);
}

function renderValidation(issues){
  const el=document.getElementById('val-list');
  if(!issues.length){ el.innerHTML='<div class="val-item INFO"><span class="val-badge">✓</span>No issues</div>'; return; }
  el.innerHTML=issues.slice(0,15).map(i=>`
    <div class="val-item ${i.severity}">
      <span class="val-badge">${i.severity}</span>
      <span>${i.camera_id?'['+i.camera_id.replace('CAM_','')+'] ':''}${i.message}</span>
    </div>`).join('');
}

// ── Save ──────────────────────────────────────────────────────────────────
function saveCalib(){
  fetch('/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(calib)})
    .then(r=>r.json()).then(d=>{
      if(d.ok) setStatus('✓ Saved — pipeline will hot-reload');
      else setStatus('Save failed');
    }).catch(e=>setStatus('Save error: '+e));
}

// ── Status ────────────────────────────────────────────────────────────────
function setStatus(msg){ document.getElementById('status-bar').textContent=msg; }

// ── Delete selected ───────────────────────────────────────────────────────
function deleteSelected(){
  if(selectedIdx>=0){ deleteZone(selectedIdx, null); }
  else { setStatus('Click a zone on canvas or in the list first, then delete'); }
}

function updateToolbar(){
  const btn = document.getElementById('btn-delete-sel');
  if(btn) btn.style.display = selectedIdx>=0 ? 'inline-block' : 'none';
}

// ── Init ──────────────────────────────────────────────────────────────────
pushHistory();
if(CAMERAS.length) selectCam(CAMERAS[0]);
window.addEventListener('resize',fitView);
</script>
</body>
