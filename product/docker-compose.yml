# ─────────────────────────────────────────────────────────────────────────────
# Store Intelligence — Detection Layer
#
# Usage (full pipeline):
#   docker compose up pipeline
#
# Point at real footage (overrides the default):
#   CLIPS_DIR=/home/hari/workspace/purpleHackathon/cctv_raw/CCTV\ Footage \
#     docker compose up pipeline
#
# Environment overrides (pass via -e or .env file):
#   STORE_ID, CLIPS_DIR, OUTPUT, GUI_PORT, SPEED, LOG_LEVEL, CAM3_START_ISO,
#   POS_ABANDON_WINDOW_SEC (45 for short clips, 300 for 20-min production)
# ─────────────────────────────────────────────────────────────────────────────

x-pipeline-base: &pipeline-base
  build:
    context: .
    dockerfile: Dockerfile.pipeline
  volumes:
    # Real footage — override CLIPS_DIR env to change this path
    - ${CLIPS_DIR:-../cctv_raw/CCTV Footage}:/data/clips:ro
    # Output: events.jsonl written to ./data/
    - ${DATA_DIR:-./data}:/data
    # Hot-reload pipeline source during development
    - ./pipeline:/app/pipeline:ro
  environment:
    STORE_ID: ${STORE_ID:-STORE_BLR_002}
    CLIPS_DIR: /data/clips
    OUTPUT: /data/events.jsonl
    GUI_PORT: ${GUI_PORT:-8080}
    SPEED: ${SPEED:-0} # 0 = max speed; 1.0 = real-time
    LOG_LEVEL: ${LOG_LEVEL:-INFO}
    PYTHONUNBUFFERED: "1"
    CAM3_START_ISO: ${CAM3_START_ISO:-}
    # Billing queue abandon window (seconds).
    # 45s for 2-min test clips; set to 300 for 20-min production clips.
    POS_ABANDON_WINDOW_SEC: ${POS_ABANDON_WINDOW_SEC:-45}
    # CUDA device visibility — set to "" to force CPU
    NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
    NVIDIA_DRIVER_CAPABILITIES: compute,video,utility

services:
  # ── Main detection pipeline ───────────────────────────────────────────────
  pipeline:
    <<: *pipeline-base
    container_name: store_detection_pipeline
    ports:
      - "${GUI_PORT:-8080}:8080"
    restart: "no"
    command: [] # uses Dockerfile ENTRYPOINT (run.sh)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

  # ── Zone calibration tool (run once to draw zone polygons) ───────────────
  calibrate:
    <<: *pipeline-base
    container_name: store_zone_calibrator
    ports:
      - "8081:8081"
    restart: "no"
    entrypoint: [ "python3", "/app/pipeline/calibrate_zones.py", "--clips_dir", "/data/clips", "--port", "8081" ]
