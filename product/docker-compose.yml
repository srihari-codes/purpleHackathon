version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Store Intelligence — Detection Layer
#
# Usage (full pipeline):
#   docker compose run --rm pipeline
#
# Usage (calibrate zones first):
#   docker compose run --rm --service-ports calibrate
#   # then open http://localhost:8081 and draw zones
#   # save zones_override.json to ./pipeline/
#
# Environment overrides (pass via -e or .env file):
#   STORE_ID, CLIPS_DIR, OUTPUT, GUI_PORT, SPEED, LOG_LEVEL, CAM3_START_ISO
# ─────────────────────────────────────────────────────────────────────────────

x-pipeline-base: &pipeline-base
  build:
    context: .
    dockerfile: Dockerfile.pipeline
  volumes:
    # Mount your clips directory here (read-only)
    - ${CLIPS_DIR:-./data/clips}:/data/clips:ro
    # Output events.jsonl and any other artefacts
    - ${DATA_DIR:-./data}:/data
    # Allow hot-reloading pipeline source during development
    - ./pipeline:/app/pipeline:ro
  environment:
    STORE_ID:      ${STORE_ID:-STORE_BLR_002}
    CLIPS_DIR:     /data/clips
    OUTPUT:        /data/events.jsonl
    GUI_PORT:      ${GUI_PORT:-8080}
    SPEED:         ${SPEED:-1.0}
    LOG_LEVEL:     ${LOG_LEVEL:-INFO}
    CAM3_START_ISO: ${CAM3_START_ISO:-}
    # CUDA device visibility — set to "" to force CPU
    NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
    NVIDIA_DRIVER_CAPABILITIES: compute,video,utility

services:
  # ── Main detection pipeline ───────────────────────────────────────────────
  pipeline:
    <<: *pipeline-base
    container_name: store_detection_pipeline
    ports:
      - "${GUI_PORT:-8080}:8080"
    # GPU support — requires nvidia-container-toolkit on the host.
    # If no GPU is available, remove the `deploy` block; pipeline falls back to CPU.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: "no"
    command: []   # uses Dockerfile ENTRYPOINT (run.sh)

  # ── Zone calibration tool (run once to draw zone polygons) ───────────────
  calibrate:
    <<: *pipeline-base
    container_name: store_zone_calibrator
    ports:
      - "8081:8081"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 0
              capabilities: [gpu]
    restart: "no"
    entrypoint: ["python3", "/app/pipeline/calibrate_zones.py",
                 "--clips_dir", "/data/clips", "--port", "8081"]
